<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Battles - Login</title>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="Logo.png" alt="Logo" width="75" height="75"></a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Ideas</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
        <hr>
    </header>
    <div class="content">
        <div class="login-container">
            <section class="left-section">
                <h2>User Login</h2>
                <form>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password">
                    </div>
                    <a href="index.html"><button type="submit">Login</button></a>
                </form>
            </section>
            <section class="right-section">
                <h2>Create an Account</h2>
                <form>
                    <div class="form-group">
                        <label for="new-username">Username</label>
                        <input type="text" id="new-username" name="new-username">
                    </div>
                    <div class="form-group">
                        <label for="new-password">Password</label>
                        <input type="password" id="new-password" name="new-password">
                    </div>
                    <div class="form-group">
                        <label for="email">Email (optional)</label>
                        <input type="email" id="email" name="email">
                    </div>
                    <div class="disclaimer">
                        <p>By providing an email address you agree to recieve notifications regarding updates and new posts.</p>
                    </div>
                    <a href="index.html"><button type="submit">Create Account</button></a>
                </form>
            </section>
        </div>
    </div>
</body>
</html>
