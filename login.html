<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Battles - Login</title>
</head>
<body>
    <header>
        <link rel="stylesheet" type="text/css" href="login.css">
        <script src="login.js"></script>
        <div class="logo">
            <a href="index.html"><img src="Logo.png" alt="Logo" width="50" height="50"></a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
        <div class="header-right">
        </div>
    </header>
    <main>
    <div class="content">
        <div class="login-container">
            <section class="left-section">
                <h2>User Login</h2>
                <form id="loginForm">
                    <hr>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="off">
                    </div>
                    <a href="index.html"><button type="submit" onclick="Login()" class="login-button">Login</button></a>
                </form>
            </section>
            <section class="right-section">
                <h2>Create an Account</h2>
                <form>
                    <hr>
                    <div class="form-group">
                        <label for="new-username">Username</label>
                        <input type="text" id="new-username" name="new-username" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="new-password">Password</label>
                        <input type="password" id="new-password" name="new-password" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="email">Email (optional)</label>
                        <input type="email" id="email" name="email" autocomplete="email">
                    </div>
                    <div class="disclaimer">
                        <p>By providing an email address you agree to recieve notifications regarding updates and new posts.</p>
                    </div>
                    <a href="index.html"><button type="submit" onclick="createAccount()" class="login-button">Create Account</button></a>
                </form>
            </section>
        </div>
    </div>
    </main>
    <footer>
        <span class="footer-right">Bryce Lasson</span>
        <div class="footer-right">
            <a href="https://github.com/bolasson/startup.git"><button class="big-button">View My Github Repository</button></a>
        </div>
    </footer>
</body>
</html>
